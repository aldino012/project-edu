server {
    listen 80;
    server_name localhost;

    # Root direktori untuk Vite/React build hasil dari TAHAP 1 Dockerfile
    root /usr/share/nginx/html;
    index index.html;

    # ==========================================
    # 1. HANDLING REACT ROUTING (PENTING!)
    # ==========================================
    # try_files akan mencari file statis, jika tidak ketemu, 
    # akan diarahkan ke index.html agar React Router tidak error 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # 2. PROXY UNTUK UPLOADS (Gambar & Audio)
    # ==========================================
    # Meneruskan request file dari /uploads/ ke container backend
    location /uploads/ {
        # Nama service dari docker-compose: backend-edu dan portnya 3000 (port internal)
        proxy_pass http://backend-edu:3000/uploads/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Penanganan file besar (audio/gambar)
        client_max_body_size 20M;
        
        # Timeout agar koneksi tidak cepat putus saat loading file besar
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    # ==========================================
    # 3. PROXY UNTUK API CALLS (Data JSON)
    # ==========================================
    # Meneruskan request dari /api/ ke container backend
    location /api/ {
        # Harus dipastikan di backend kamu router utamanya tidak berawalan /api 
        # (jika ya, hapus trailing slash di backend-edu:3000/api/)
        # Tapi berdasarkan server.js kamu, ini sudah benar
        proxy_pass http://backend-edu:3000/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}